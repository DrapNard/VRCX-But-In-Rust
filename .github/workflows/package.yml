name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: macos-packages
          - os: ubuntu-22.04
            artifact-name: linux-packages
          - os: windows-latest
            artifact-name: windows-packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev rpm

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Check
        run: cargo check --all-targets --all-features

      - name: Package macOS
        if: runner.os == 'macOS'
        run: cargo packager --release --formats app --formats dmg

      - name: Set macOS DMG volume icon
        if: runner.os == 'macOS'
        run: scripts/set-dmg-volume-icon.sh target/dist/*.dmg assets/icons/vrcx-bir-volume.icns

      - name: Package Linux
        if: runner.os == 'Linux'
        run: cargo packager --release --formats appimage --formats deb --formats pacman

      - name: Package Windows
        if: runner.os == 'Windows'
        run: cargo packager --release --formats wix

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/dist/**
          if-no-files-found: error
