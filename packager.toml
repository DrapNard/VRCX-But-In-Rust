name = "vrcx-but-in-rust"
product-name = "VRCX - BIR"
identifier = "com.drapnard.vrcxbir"
version = "0.1.0"
authors = ["DrapNard"]
publisher = "DrapNard"
copyright = "Copyright 2026 DrapNard"
description = "A native, lightweight, cross-platform VRChat companion app written in Rust."
long-description = """
VRCX But In Rust is an unofficial native desktop companion app for VRChat.
It is built with Rust and iced, with no embedded browser or Electron runtime.
"""
homepage = "https://github.com/DrapNard/VRCX-But-In-Rust"
license-file = "LICENCE"
category = "Utility"
out-dir = "target/dist"
binaries-dir = "target/release"
before-packaging-command = "cargo build --release"
icons = [
  "assets/icons/vrcx-bir.png",
  "assets/icons/vrcx-bir.ico",
  "assets/icons/vrcx-bir.icns",
  "assets/icons/vrcx-bir-volume.icns",
]
binaries = [{ path = "vrcx-but-in-rust", main = true }]

[linux]
generate-desktop-entry = true

[deb]
section = "utils"
priority = "optional"

[pacman]
provides = ["vrcx-but-in-rust"]

[windows]
allow-downgrades = false

[dmg]
window-size = { width = 660, height = 420 }
app-position = { x = 180, y = 170 }
application-folder-position = { x = 480, y = 170 }
